server:
  port: ${PORT:9090}

spring:
  application:
    name: leafone-forum
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:leafone}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: "NULL"
      id-type: assign_id

leafone:
  jwt:
    secret: ${JWT_SECRET:leafone-forum-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    access-token-expiration: 7200  # 2 hours
    refresh-token-expiration: 604800  # 7 days
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:ap-shanghai}
  cdn-domain: ${CDN_DOMAIN:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3006,http://localhost:3007,http://localhost:3008}
  log:
    enabled: ${LOG_ENDPOINT_ENABLED:true}  # 生产环境设为 false 关闭日志查看接口
